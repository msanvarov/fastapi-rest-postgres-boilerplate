name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.11"

jobs:
  # ---------------------------------------------------------------------------
  # 1) Lint & static analysis — fast, no services needed.
  # ---------------------------------------------------------------------------
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-extras --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Pre-commit (all files)
        run: uv run pre-commit run --all-files --show-diff-on-failure --color=always

  # ---------------------------------------------------------------------------
  # 2) Tests — needs Postgres + Redis.
  # ---------------------------------------------------------------------------
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      SECRET_KEY: ci-secret-key-must-be-at-least-32-characters-long-yes
      POSTGRES_DB: app_test
      APP_ENV: test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install deps
        run: uv sync --all-extras --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Pytest (unit + integration, with coverage)
        run: uv run pytest --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3) Container smoke test — build the image, run it, hit /ping.
  # This is the gate that catches "passes tests but the container is broken".
  # ---------------------------------------------------------------------------
  smoke:
    name: container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    env:
      IMAGE_TAG: fastapi-async-boilerplate:ci-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true                 # load into local docker daemon
          push: false
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot stack (postgres + redis + api)
        env:
          SECRET_KEY: smoke-secret-must-be-at-least-32-characters-long-ok
        run: |
          # Override the api image with the one we just built. We use a small
          # inline override file so we don't carry CI-only config in the repo's
          # primary compose file.
          cat > docker-compose.smoke.yml <<EOF
          services:
            api:
              image: ${IMAGE_TAG}
              build: !reset null
              environment:
                SECRET_KEY: ${SECRET_KEY}
                POSTGRES_HOST: postgres
                REDIS_URL: redis://redis:6379/0
                APP_ENV: staging
                APP_LOG_JSON: "true"
          EOF
          docker compose -f docker-compose.yml -f docker-compose.smoke.yml up -d

      - name: Smoke test
        env:
          SMOKE_TIMEOUT: "90"
        run: ./scripts/smoke.sh http://localhost:8000

      - name: Dump api logs on failure
        if: failure()
        run: docker compose logs api

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # 4) CI summary — single required check for branch protection.
  # ---------------------------------------------------------------------------
  ci-summary:
    name: ci summary
    runs-on: ubuntu-latest
    needs: [lint, test, smoke]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.smoke.result }}" != "success" ]]; then
            echo "::error::A required CI job did not succeed."
            echo "lint=${{ needs.lint.result }} test=${{ needs.test.result }} smoke=${{ needs.smoke.result }}"
            exit 1
          fi
          echo "All required CI jobs passed."
