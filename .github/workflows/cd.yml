name: cd

# CD chains off CI completion instead of triggering on the same push. This
# eliminates the race that the previous `wait-on-check-action` polling had:
# there's no window where CD could start before CI has registered its checks.
#
# Triggers:
#   * CI workflow run succeeds on main → build, push :main + :sha, smoke,
#     deploy to staging
#   * Tag push v*.*.*               → build, push :semver + :latest, smoke,
#                                      deploy to production
#   * workflow_dispatch             → manual deploy with explicit ref
#
# Note: workflow_run always runs the workflow file from the *default branch*.
# That's what we want — we don't want a malicious PR to be able to redefine
# the deploy logic before its own CI run completes.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"

concurrency:
  group: cd-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false   # never cancel a deploy mid-flight

permissions:
  contents: read
  packages: write              # push to GitHub Container Registry
  id-token: write              # OIDC for future cloud deploys

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1) Gate — for workflow_run, only proceed if CI actually succeeded.
  #    GitHub fires the workflow_run trigger for any conclusion (success,
  #    failure, cancelled), so we filter explicitly.
  # ---------------------------------------------------------------------------
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - id: resolve
        run: |
          # workflow_run fires from default branch; we need the SHA *from CI*,
          # not the current default-branch HEAD. For tag/manual, fall through.
          case "${{ github.event_name }}" in
            workflow_run)
              echo "sha=${{ github.event.workflow_run.head_sha }}"  >> "$GITHUB_OUTPUT"
              echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ---------------------------------------------------------------------------
  # 2) Build + push the container image to GHCR.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: build + push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: gate
    outputs:
      sha-tag: sha-${{ needs.gate.outputs.sha }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Don't let metadata-action pull tags from the current event ref —
          # it can mis-attribute tags when fired via workflow_run.
          tags: |
            type=raw,value=main,enable=${{ needs.gate.outputs.ref == 'main' }}
            type=raw,value=latest,enable=${{ needs.gate.outputs.ref == 'main' }}
            type=sha,format=long,prefix=sha-,enable=true
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.gate.outputs.sha }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ---------------------------------------------------------------------------
  # 3) Smoke-test the *pulled* image — proves what we just pushed actually runs.
  # ---------------------------------------------------------------------------
  smoke:
    name: smoke published image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [gate, build-and-push]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stand up stack against the published :sha tag
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.sha-tag }}
          SECRET_KEY: smoke-secret-must-be-at-least-32-characters-long-ok
        run: |
          cat > docker-compose.smoke.yml <<EOF
          services:
            api:
              image: ${IMAGE_REF}
              build: !reset null
              environment:
                SECRET_KEY: ${SECRET_KEY}
                POSTGRES_HOST: postgres
                REDIS_URL: redis://redis:6379/0
                APP_ENV: production
                APP_LOG_JSON: "true"
          EOF
          docker compose -f docker-compose.yml -f docker-compose.smoke.yml up -d

      - name: Smoke test
        env:
          SMOKE_TIMEOUT: "120"
        run: ./scripts/smoke.sh http://localhost:8000

      - name: Dump api logs on failure
        if: failure()
        run: docker compose logs api

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # 4) Deploy — placeholder for whatever target you run on.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [gate, build-and-push, smoke]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - name: Plan
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "Deploying ${GITHUB_REF#refs/tags/} to production"
          else
            echo "Deploying ${{ needs.gate.outputs.ref }}@${{ needs.gate.outputs.sha }} to staging"
          fi

      - name: Deploy (placeholder)
        run: |
          echo "::notice::Wire your deployment command here."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.sha-tag }}"
          echo "Digest: ${{ needs.build-and-push.outputs.digest }}"

  # ---------------------------------------------------------------------------
  # 5) Post-deploy smoke against the real environment.
  # ---------------------------------------------------------------------------
  post-deploy-smoke:
    name: post-deploy smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [gate, deploy]
    if: vars.SMOKE_BASE_URL != ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Smoke remote
        env:
          SMOKE_TIMEOUT: "60"
        run: ./scripts/smoke.sh "${{ vars.SMOKE_BASE_URL }}"
