# Pre-commit hooks. Install via: `uv run pre-commit install`
# Run on every commit; CI also runs `pre-commit run --all-files` as a safety net.
default_language_version:
  python: python3.12

default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements
      - id: check-ast

  # Run ruff through uv so the version is *always* what uv.lock pins. The
  # alternative — pinning a separate version under ruff-pre-commit — drifts
  # against the project venv and we've already burnt one CI cycle on that.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: true

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.5.11
    hooks:
      - id: uv-lock
      - id: uv-export
        args: ["--frozen", "--output-file=requirements.txt", "--no-dev"]

  # Note on mypy: we deliberately don't run mypy via pre-commit because the
  # isolated env can't see our actual runtime deps (fastapi, argon2, etc.)
  # without us maintaining a duplicate dep list. CI's `lint` job runs
  # `uv run mypy src` against the full venv, and `make check` does the same
  # locally — those are the canonical sources of truth.

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert]

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit)
        entry: uv run pytest -m "unit" -x -q --no-cov
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
